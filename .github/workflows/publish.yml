name: publish

# Test this workflow by making similar changes to `publish-test.yml` and triggering it manually
#
# OIDC authentication does not work with shared workflows,
# so the code essentially needs to be duplicated in the `publish.yml` and `publish-test.yml` workflows.

on:
  push:
    tags:
      - 'v*'
  # Tags created by a workflow using GITHUB_TOKEN do not trigger other workflows,
  # so we use workflow_run to publish after the release workflow creates a tag.
  workflow_run:
    workflows: ["release"]
    types:
      - completed
  # The workflow is usually triggered when the release workflow completes, but it can also be re-triggered manually if needed using
  # gh workflow run publish.yml --ref <tag>
  # gh run list --workflow publish.yml
  workflow_dispatch:
  repository_dispatch:

env:
  MISE_EXPERIMENTAL: true

jobs:
  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    # workflow_run fires on both success and failure; skip if the release workflow failed.
    # For all other triggers (push, workflow_dispatch, repository_dispatch), always run.
    if: >-
      github.event.workflow_run.conclusion == 'success'
      || github.event_name != 'workflow_run'
    environment:
      name: pypi
      # cosmetic URL displayed in the GitHub UI for the environment,
      # not to be confused with the repository-url used by the pypa/gh-action-pypi-publish action,
      # which is the actual URL of the repository where the package is published
      url: https://pypi.org/p/photree/
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    steps:
    - uses: actions/checkout@v7
      with:
        fetch-depth: 0
        fetch-tags: true
        ref: ${{ github.event.workflow_run.head_sha || github.sha }}
    - uses: jdx/mise-action@v4
      with:
        # Install unlocked (`install: false` + a plain `mise install`) rather
        # than the action's default `mise install --locked`.
        #
        # This is NOT ideal: locked installs pin an exact per-platform URL +
        # checksum from mise.lock, giving reproducible, tamper-evident tool
        # installs. We would prefer to keep that.
        #
        # However, poetry is installed via the vfox-poetry backend, which does
        # not record per-platform lockfile URLs in mise.lock (and `mise lock`
        # cannot generate them). So `--locked` fails on a fresh runner with:
        #   No lockfile URL found for poetry@<ver> on platform linux-x64
        # Until that backend supports lockfile URLs, unlocked is the only
        # option here. test.yml uses the same pattern.
        install: false
    - run: mise install
    - run: mise run ci-build
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
