name: check-links

on:
  # Manually trigger the workflow using
  # gh workflow run check-links.yml # --ref <branch>
  # gh run list --workflow check-links.yml # --branch <branch>
  workflow_dispatch:
  repository_dispatch:
  schedule:
    - cron: "00 18 * * 1"

jobs:
  linkChecker:
    runs-on: ubuntu-latest
    permissions:
      issues: write # required for peter-evans/create-issue-from-file
    steps:
      - uses: actions/checkout@v6

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # treat redirects (3xx) as successful instead of flagging them
          args: --accept 2xx,3xx --insecure
          fail: false

      - name: Check for broken links in output
        id: broken
        run: |
          if [ -s ./lychee/out.md ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Issue From File
        if: steps.lychee.outputs.exit_code != 0 && steps.broken.outputs.found == 'true'
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: Link Checker Report
          content-filepath: ./lychee/out.md
          labels: report, automated issue
